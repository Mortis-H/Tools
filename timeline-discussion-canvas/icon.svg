<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#1e293b"/>
  
  <!-- Top lane blocks -->
  <rect x="20" y="30" width="40" height="12" rx="4" fill="#3b82f6"/>
  <rect x="70" y="30" width="10" height="12" rx="4" fill="#3b82f6"/>
  
  <!-- Bottom lane blocks -->
  <rect x="30" y="55" width="20" height="12" rx="4" fill="#10b981"/>
  <rect x="60" y="55" width="20" height="12" rx="4" fill="#10b981"/>
  
  <!-- Vertical timeline guide / playhead -->
  <line x1="45" y1="20" x2="45" y2="80" stroke="#ff0066" stroke-width="4" stroke-linecap="round"/>
  <circle cx="45" cy="20" r="6" fill="#ff0066"/>
</svg>
